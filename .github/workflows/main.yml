name: TiemVe E2E Cross-Repo Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  e2e-testing:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
          POSTGRES_DB: tiem_ve_db
        ports:
          - 5432:5432
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
      - name: 1. Checkout Cypress Code (Repo hiện tại)
        uses: actions/checkout@v4

      # ... (Các bước Postgres, Redis giữ nguyên)

      - name: 2. Checkout Backend Code (Repo A)
        uses: actions/checkout@v4
        with:
          repository: hoangdotester/Project-Climping-Rose
          token: ${{ secrets.BE_REPO_TOKEN }} 
          path: backend-app

      - name: 3. Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 4. Build & Start Backend
        env:
          # (Giữ nguyên đống env cũ của Đô: DB_URL, CLOUDINARY, JWT...)
          DB_URL: jdbc:postgresql://localhost:5432/tiem_ve_db
          DB_USERNAME: root
          DB_PASSWORD: password
          USER_SERVICE_REDIS_HOST: localhost
          USER_SERVICE_REDIS_PORT: 6379
          JWT_SIGNER_KEY: ${{ secrets.JWT_SIGNER_KEY }}
        run: |
          # Lệnh debug: Xem thực tế trong backend-app có gì
          ls -R backend-app 
          
          # Nếu file pom.xml nằm ngay trong BE thì lệnh này đúng:
          cd backend-app/BE/tiem-ve-climping-rose-be
          mvn clean install -DskipTests
          mvn spring-boot:run & 

      - name: 5. Wait for Backend Ready
        run: npx wait-on http://localhost:8080/api/paintings --timeout 180000

      - name: 6. Run Cypress Tests
        uses: cypress-io/github-action@v6
        with:
          install-command: npm install
          config: baseUrl=http://localhost:8080

      - name: 7. Upload Artifacts (Screenshots & Videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results
          path: |
            cypress/screenshots
            cypress/videos