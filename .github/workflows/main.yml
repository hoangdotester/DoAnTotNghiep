name: TiemVe E2E Cross-Repo Pipeline

on:
  repository_dispatch:
    types: [run-smoke-test, run-full-regression-test]
  push:
    branches: [ "main", "master" ]
  # schedule:
  #   - cron: '0 17 * * *'

jobs:
  e2e-testing:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
          POSTGRES_DB: tiem_ve_db
        ports: [5432:5432]
      redis:
        image: redis:latest
        ports: [6379:6379]

    steps:
      - name: 1. Checkout Cypress Code
        uses: actions/checkout@v4

      - name: 2. Checkout Backend Code
        uses: actions/checkout@v4
        with:
          repository: hoangdotester/Project-Climping-Rose
          token: ${{ secrets.BE_REPO_TOKEN }} 
          ref: ${{ github.event.client_payload.sha }}
          path: backend-app

      - name: 3. Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 4. Build, Start & Wait Backend
        id: build_be
        env:
          # --- Cấu hình Server ---
          PORT: 8080
          
          # --- Cấu hình Database (Dùng Service Postgres ở trên) ---
          DB_URL: jdbc:postgresql://localhost:5432/tiem_ve_db
          DB_USERNAME: root
          DB_PASSWORD: password
          
          # --- Cấu hình Redis (Dùng Service Redis ở trên) ---
          USER_SERVICE_REDIS_HOST: 127.0.0.1
          USER_SERVICE_REDIS_PORT: 6379
          USER_SERVICE_REDIS_PASSWORD: ""
          USER_SERVICE_REDIS_TIMEOUT: 60s
          # Lưu ý: application.yml của bạn để ssl: true, 
          # nhưng chạy local trong GitHub Actions thì phải tắt đi
          SPRING_DATA_REDIS_SSL_ENABLED: "false"
          SPRING_REDIS_SSL_ENABLED: "false"
          
          # --- Cấu hình JWT ---
          JWT_SIGNER_KEY: ${{ secrets.JWT_SIGNER_KEY }}
          JWT_VALID_DURATION: ${{ secrets.JWT_VALID_DURATION }}
          JWT_REFRESHABLE_DURATION: 36000
          
          # --- Cấu hình Mail (Mailtrap) ---
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          
          # --- Cấu hình Cloudinary ---
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          
          # --- Cấu hình Social Login ---
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          FACEBOOK_CLIENT_ID: ${{ secrets.FACEBOOK_CLIENT_ID }}
          FACEBOOK_CLIENT_SECRET: ${{ secrets.FACEBOOK_CLIENT_SECRET }}
        run: |
          cd backend-app/BE/tiem-ve-climping-rose-be
          mvn clean install -DskipTests
          mvn spring-boot:run & 
          echo "Waiting for Backend to wake up on port 8080..."
          npx wait-on tcp:8080 --timeout 180000

      - name: 5. Run Cypress Tests
        id: cypress_test
        uses: cypress-io/github-action@v6
        with:
          install-command: npm install
          config: baseUrl=http://localhost:8080
          spec: ${{ github.event.action == 'run-smoke-test' && 'cypress/tests/smoke/**/*.js' || 'cypress/tests/regression/**/*.js' }}

      - name: 6. Archive Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results
          path: |
            cypress/screenshots
            cypress/videos

      - name: 7. Report Status Back to Backend
        if: always()
        run: |
          STATE="success"
          if [ "${{ job.status }}" != "success" ]; then STATE="failure"; fi
          
          curl -L -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.BE_REPO_TOKEN }}" \
          https://api.github.com/repos/${{ github.event.client_payload.repo }}/statuses/${{ github.event.client_payload.sha }} \
          -d "{\"state\":\"$STATE\",\"target_url\":\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"description\":\"Cypress Smoke Tests\",\"context\":\"Cypress-Gatekeeper\"}"

      - name: 8. Auto-merge PR if tests pass
        if: success() && github.event_name == 'repository_dispatch'
        env:
          GH_TOKEN: ${{ secrets.BE_REPO_TOKEN }}
        run: |
          # Tìm số PR dựa trên mã SHA rồi mới ra lệnh Merge
          PR_NUMBER=$(gh pr list --repo ${{ github.event.client_payload.repo }} --search "${{ github.event.client_payload.sha }}" --json number --jq '.[0].number')
          
          if [ -n "$PR_NUMBER" ]; then
            gh pr merge $PR_NUMBER --auto --merge --repo ${{ github.event.client_payload.repo }}
          else
            echo "Không tìm thấy PR tương ứng với SHA này!"
          fi

      - name: 9. Notify Discord (Chỉ báo cho nhánh MAIN)
        # LỌC: Luôn chạy nhưng CHỈ khi hành động là run-full-regression (tức là từ Main)
        if: always() && github.event.action == 'run-full-regression'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "🚀 Báo cáo Production: Project-Climping-Rose"
          description: |
            **Trạng thái:** ${{ job.status == 'success' && '✅ ĐÃ LÊN LIVE THÀNH CÔNG' || '❌ TRIỂN KHAI THẤT BẠI' }}
            **Lý do:** ${{ 
              steps.build_be.outcome == 'failure' && 'Lỗi Server Backend' || 
              steps.cypress_test.outcome == 'failure' && 'Lỗi Test Hồi Quy (Regression)' ||
              'Mọi thứ ổn định' 
            }}
            **Người thực hiện:** ${{ github.actor }}
          color: ${{ job.status == 'success' && '0x00ff00' || '0xff0000' }}
          url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"