name: TiemVe E2E Cross-Repo Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  e2e-testing:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
          POSTGRES_DB: tiem_ve_db
        ports:
          - 5432:5432
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
      - name: 1. Checkout Cypress Code (Repo hiện tại)
        uses: actions/checkout@v4

      - name: 2. Checkout Backend Code (Repo A)
        uses: actions/checkout@v4
        with:
          # Kiểm tra kỹ tên repo: hoangdotester/Project-Climping-Rose
          repository: hoangdotester/Project-Climping-Rose
          token: ${{ secrets.BE_REPO_TOKEN }} 
          path: backend-app

      # --- BƯỚC NÀY CỰC KỲ QUAN TRỌNG ĐÔ ĐANG THIẾU ---
      - name: 3. Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 4. Build & Start Backend
        env:
          # Cấu hình Database & Redis
          DB_URL: jdbc:postgresql://localhost:5432/tiem_ve_db
          DB_USERNAME: root
          DB_PASSWORD: password
          USER_SERVICE_REDIS_HOST: localhost
          USER_SERVICE_REDIS_PORT: 6379
          USER_SERVICE_REDIS_PASSWORD: ""
          USER_SERVICE_REDIS_TIMEOUT: 60s
          
          # Secrets từ GitHub
          JWT_SIGNER_KEY: ${{ secrets.JWT_SIGNER_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}

          # Các biến bổ sung để tránh crash lúc startup
          JWT_VALID_DURATION: 3600
          GOOGLE_CLIENT_ID: "dummy-id"
          FACEBOOK_CLIENT_ID: "dummy-id"
          FACEBOOK_CLIENT_SECRET: "dummy-secret"
        run: |
          # Di chuyển vào folder BE nơi chứa file pom.xml
          cd backend-app/BE
          mvn clean install -DskipTests
          mvn spring-boot:run & 

      - name: 5. Wait for Backend Ready
        # Tăng timeout lên 180s vì build Maven lần đầu trên GitHub hơi chậm
        run: npx wait-on http://localhost:8080/api/paintings --timeout 180000

      - name: 6. Run Cypress Tests
        uses: cypress-io/github-action@v6
        with:
          install-command: npm install
          config: baseUrl=http://localhost:8080

      - name: 7. Upload Artifacts (Screenshots & Videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results
          path: |
            cypress/screenshots
            cypress/videos